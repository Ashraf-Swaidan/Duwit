name: Deploy Web (Firebase Hosting)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GEMINI_MODEL: ${{ secrets.VITE_GEMINI_MODEL }}
          VITE_GEMINI_TTS_MODEL: ${{ secrets.VITE_GEMINI_TTS_MODEL }}
          VITE_GEMINI_LIVE_MODEL: ${{ secrets.VITE_GEMINI_LIVE_MODEL }}
          VITE_GEMINI_31_FLASH_LIVE_MODEL: ${{ secrets.VITE_GEMINI_31_FLASH_LIVE_MODEL }}
          VITE_GEMINI_TTS_VOICE: ${{ secrets.VITE_GEMINI_TTS_VOICE }}
          VITE_GEMINI_EPHEMERAL_TOKEN_URL: ${{ secrets.VITE_GEMINI_EPHEMERAL_TOKEN_URL }}
          VITE_POLLINATIONS_API_KEY: ${{ secrets.VITE_POLLINATIONS_API_KEY }}

      - name: Deploy Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DUWIT_45A37 }}
          channelId: live
          projectId: duwit-45a37
